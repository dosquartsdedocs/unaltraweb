<!DOCTYPE html> <html lang="en"> <head> <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"> <meta charset="utf-8"> <meta name="viewport" content="width=device-width, initial-scale=1"> <title>unaltraweb</title> <script>
      (function () {
        var supportedLanguages = ["en","es","ca"];
        var defaultLanguage = "en";
        var baseUrl = "/unaltraweb";

        var browserLanguages = navigator.languages || [navigator.language || defaultLanguage];
        var selectedLanguage = defaultLanguage;

        for (var i = 0; i < browserLanguages.length; i += 1) {
          var languageCode = (browserLanguages[i] || "").toLowerCase().split("-")[0];
          if (supportedLanguages.indexOf(languageCode) !== -1) {
            selectedLanguage = languageCode;
            break;
          }
        }

        var targetPath = (baseUrl || "") + "/" + selectedLanguage + "/";
        var suffix = (window.location.search || "") + (window.location.hash || "");
        window.location.replace(targetPath + suffix);
      })();
    </script> </head> <body> <noscript> <p> JavaScript is required for language redirection. <a href="/unaltraweb/en/">Continue to the default language</a>. </p> </noscript> </body> </html>
